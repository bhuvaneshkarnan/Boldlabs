<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeadAdmin Dashboard — Boldlabs Studio</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Google Fonts Preconnect and Load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  
    <!-- Google Fonts Preconnect and Load -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: var(--space-xl) var(--space-md);
    }
    .admin-card {
      background-color: var(--color-bg-card);
      border: var(--border-width) solid var(--color-border);
      padding: var(--space-xl);
      margin-bottom: var(--space-lg);
    }
    .admin-title {
      font-family: var(--font-display);
      text-transform: uppercase;
      font-size: 1.8rem;
      margin-bottom: var(--space-md);
      color: var(--color-text);
      letter-spacing: -0.01em;
    }
    .leads-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--color-text);
      margin-top: var(--space-md);
    }
    .leads-table th {
      background-color: #1a1a1a;
      border-bottom: 2px solid var(--color-border);
      padding: 12px;
      text-align: left;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }
    .leads-table td {
      border-bottom: 1px dashed var(--color-border);
      padding: 12px;
      vertical-align: top;
      color: var(--color-text-muted);
    }
    .leads-table tr:hover td {
      color: var(--color-text);
      background-color: #0d0d0d;
    }
    .login-form {
      max-width: 400px;
      margin: 80px auto;
      padding: var(--space-xl);
      background-color: var(--color-bg-card);
      border: 2px solid var(--color-text);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-bottom: var(--space-md);
    }
    .form-group label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid var(--color-border);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      background: #121212;
      color: #ffffff;
      outline: none;
      border-radius: 0;
    }
    .form-group input:focus {
      border-color: var(--color-text);
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.65rem;
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      margin-left: 10px;
    }
    .badge-configured {
      background-color: #008000;
      color: #ffffff;
    }
    .badge-mock {
      background-color: #ffa500;
      color: #000000;
    }
  </style>
</head>
<body>

  <!-- Floating Navigation Bar -->
  <nav class="navbar" aria-label="Main Navigation">
    <a href="index.html#home" class="navbar-brand">Boldlabs Studio</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#services">Services</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#latest-drop">Missions</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#timeline">Timeline</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#player">Reviews</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#plans">Store</a>
    <span class="navbar-divider" aria-hidden="true">|</span>
    <a href="index.html#build-together">Book Call</a>
  </nav>

  <!-- Login Area -->
  <div id="login-section" class="container" style="display: block;">
    <div class="login-form">
      <h2 style="font-family: var(--font-display); text-transform: uppercase; font-size: 1.4rem; margin-bottom: var(--space-md); text-align: center;">MeadAdmin Login</h2>
      <div id="fallback-alert" style="display: none; padding: 10px; background-color: rgba(255, 165, 0, 0.1); border: 1px solid #ffa500; color: #ffa500; font-family: var(--font-mono); font-size: 0.7rem; margin-bottom: var(--space-md); text-align: center;">
        MOCK MODE: Use any email and password to log in and test.
      </div>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-email">Email</label>
          <input type="email" id="admin-email" required placeholder="admin@boldlabs.studio">
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="pill-btn pill-btn-primary" style="width: 100%; border-radius: 0; border: 1.5px solid var(--color-text); cursor: pointer; text-align: center; display: block; margin-top: var(--space-md);">
          LOG IN
        </button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard Area -->
  <div id="dashboard-section" class="admin-container" style="display: none;">
    <div class="admin-card">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border-width) solid var(--color-border); padding-bottom: var(--space-sm); margin-bottom: var(--space-lg); flex-wrap: wrap; gap: var(--space-sm);">
        <div>
          <h1 class="admin-title" style="margin: 0; display: inline-block; vertical-align: middle;">MeadAdmin Dashboard</h1>
          <span id="config-badge" class="status-badge"></span>
        </div>
        <div style="display: flex; gap: var(--space-xs);">
          <button id="export-csv-btn" class="pill-btn pill-btn-secondary" style="font-size: 0.7rem; padding: 8px 16px; border-radius: 0; cursor: pointer;">Export CSV</button>
          <button id="clear-leads-btn" class="pill-btn pill-btn-secondary" style="font-size: 0.7rem; padding: 8px 16px; border-radius: 0; cursor: pointer; display: none;">Clear Mock Leads</button>
          <button id="logout-btn" class="pill-btn pill-btn-primary" style="font-size: 0.7rem; padding: 8px 16px; border-radius: 0; cursor: pointer;">Log Out</button>
        </div>
      </div>

      <div style="overflow-x: auto;">
        <table class="leads-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>WhatsApp Number</th>
              <th>Preference</th>
              <th>What they need help with</th>
            </tr>
          </thead>
          <tbody id="leads-table-body">
            <tr>
              <td colspan="6" style="text-align: center; padding: var(--space-xl); color: var(--color-text-muted);">No leads captured yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs & Config -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginSection = document.getElementById('login-section');
      const dashboardSection = document.getElementById('dashboard-section');
      const loginForm = document.getElementById('admin-login-form');
      const leadsTableBody = document.getElementById('leads-table-body');
      const logoutBtn = document.getElementById('logout-btn');
      const exportCsvBtn = document.getElementById('export-csv-btn');
      const clearLeadsBtn = document.getElementById('clear-leads-btn');
      const configBadge = document.getElementById('config-badge');
      const fallbackAlert = document.getElementById('fallback-alert');

      // Update configuration badge and warning alerts
      if (isFirebaseConfigured) {
        configBadge.textContent = "Firebase Live";
        configBadge.className = "status-badge badge-configured";
        fallbackAlert.style.display = "none";
      } else {
        configBadge.textContent = "Local Mock Storage";
        configBadge.className = "status-badge badge-mock";
        fallbackAlert.style.display = "block";
        clearLeadsBtn.style.display = "inline-block";
      }

      // Check current login state
      if (isFirebaseConfigured && auth) {
        auth.onAuthStateChanged(user => {
          if (user) {
            showDashboard();
          } else {
            showLogin();
          }
        });
      } else {
        // Local Mock Login check
        const isMockLoggedIn = sessionStorage.getItem('boldlabs_mock_logged_in') === 'true';
        if (isMockLoggedIn) {
          showDashboard();
        } else {
          showLogin();
        }
      }

      // Login form submission
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('admin-email').value.trim();
        const password = document.getElementById('admin-password').value.trim();

        if (isFirebaseConfigured && auth) {
          try {
            await auth.signInWithEmailAndPassword(email, password);
            showDashboard();
          } catch (error) {
            console.error("Login failed:", error);
            alert("Error logging in: " + error.message);
          }
        } else {
          // Local Storage Mock mode logs in instantly with any password
          sessionStorage.setItem('boldlabs_mock_logged_in', 'true');
          showDashboard();
        }
      });

      // Logout handler
      logoutBtn.addEventListener('click', async () => {
        if (isFirebaseConfigured && auth) {
          await auth.signOut();
        } else {
          sessionStorage.removeItem('boldlabs_mock_logged_in');
        }
        showLogin();
      });

      // Clear Mock Leads button handler
      clearLeadsBtn.addEventListener('click', () => {
        if (confirm("Are you sure you want to clear all mock leads?")) {
          localStorage.removeItem('boldlabs_mock_leads');
          loadLeads();
        }
      });

      // Export CSV handler
      exportCsvBtn.addEventListener('click', () => {
        const rows = Array.from(leadsTableBody.querySelectorAll('tr'));
        if (rows.length === 0 || (rows.length === 1 && rows[0].cells.length === 1)) {
          alert("No data available to export.");
          return;
        }

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Date,Name,Email,WhatsApp Number,Preference,Question\n";

        rows.forEach(tr => {
          const cells = Array.from(tr.cells);
          if (cells.length < 6) return;
          const rowData = cells.map(td => `"${td.textContent.replace(/"/g, '""').trim()}"`).join(",");
          csvContent += rowData + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `boldlabs_leads_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      });

      function showLogin() {
        loginSection.style.display = 'block';
        dashboardSection.style.display = 'none';
      }

      function showDashboard() {
        loginSection.style.display = 'none';
        dashboardSection.style.display = 'block';
        loadLeads();
      }

      // Load leads from storage
      async function loadLeads() {
        leadsTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: var(--space-lg); color: var(--color-text-muted);">Loading leads...</td></tr>';
        
        let leads = [];
        
        if (isFirebaseConfigured && db) {
          try {
            const snapshot = await db.collection('leads').orderBy('timestamp', 'desc').get();
            snapshot.forEach(doc => {
              const data = doc.data();
              leads.push({
                date: data.timestamp ? new Date(data.timestamp).toLocaleString() : 'N/A',
                name: data.name || '',
                email: data.email || '',
                whatsapp: data.whatsapp || '',
                contactMethod: data.contactMethod || 'N/A',
                question: data.question || ''
              });
            });
          } catch (error) {
            console.error("Error reading Firestore leads:", error);
            leadsTableBody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: var(--space-lg); color: #ff0000;">Error loading leads: ${error.message}</td></tr>`;
            return;
          }
        } else {
          // Local storage fallback
          const localLeads = JSON.parse(localStorage.getItem('boldlabs_mock_leads') || '[]');
          leads = localLeads.reverse().map(l => ({
            date: l.timestamp ? new Date(l.timestamp).toLocaleString() : 'N/A',
            name: l.name || '',
            email: l.email || '',
            whatsapp: l.whatsapp || '',
            contactMethod: l.contactMethod || 'N/A',
            question: l.question || ''
          }));
        }

        if (leads.length === 0) {
          leadsTableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: var(--space-xl); color: var(--color-text-muted);">No leads captured yet.</td></tr>';
          return;
        }

        leadsTableBody.innerHTML = leads.map(l => {
          const cleanNo = l.whatsapp.replace(/[^0-9]/g, '');
          return `
            <tr>
              <td style="white-space: nowrap;">${l.date}</td>
              <td style="font-weight: 700; color: var(--color-text);">${escapeHtml(l.name)}</td>
              <td><a href="mailto:${l.email}" style="text-decoration: underline;">${escapeHtml(l.email)}</a></td>
              <td style="white-space: nowrap; font-weight: 700;">
                <a href="https://wa.me/${cleanNo}" target="_blank" rel="noopener" style="text-decoration: underline; color: #00ff00;">
                  ${escapeHtml(l.whatsapp)}
                </a>
              </td>
              <td style="font-family: var(--font-mono); font-size: 0.72rem; text-transform: uppercase;">
                ${escapeHtml(l.contactMethod)}
              </td>
              <td style="line-height: 1.5;">${escapeHtml(l.question)}</td>
            </tr>
          `;
        }).join('');
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    });
  </script>

</body>
</html>
